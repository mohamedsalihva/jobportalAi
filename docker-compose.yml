version: "3.9"

services:
  api:
    build: ./server
    container_name: express-api
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    networks:
      - jobPortal-network

  client:
    build:
      context: ./client
      args:
        VITE_BACKEND_URL: http://localhost:3000/api
        VITE_RAZORPAY_KEY_ID: rzp_test_S9IOAzKkcTlBfY
    container_name: react-client
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - jobPortal-network

networks:
  jobPortal-network:
