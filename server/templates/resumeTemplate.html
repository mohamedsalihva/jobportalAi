<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      color: #222;
      line-height: 1.6;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }
    h2 {
      font-size: 16px;
      margin-top: 20px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }
    ul {
      margin-left: 20px;
    }
  </style>
</head>

<body>

<h1>{{name}}</h1>

<h2>Professional Summary</h2>
<p>{{summary}}</p>

<h2>Skills</h2>
<ul>{{skills}}</ul>

<h2>Experience</h2>
<ul>{{experience}}</ul>

<h2>Projects</h2>
<ul>{{projects}}</ul>

<h2>Education</h2>
<p>{{education}}</p>

</body>
</html>
